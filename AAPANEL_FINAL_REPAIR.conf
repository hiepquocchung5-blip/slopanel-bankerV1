server {
    listen 80;
    listen 443 ssl;
    server_name slofinace.website www.slofinace.website;
    index index.html index.htm default.htm default.html;
    
    # SSL CONFIGURATION
    ssl_certificate    /www/server/panel/vhost/cert/slopanelbankerV1/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/slopanelbankerV1/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    # HTTP to HTTPS Redirect
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    
    # Node.js Reverse Proxy to 6937
    location / {
        proxy_pass http://127.0.0.1:6937;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Optimization for Next.js
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        
        # Disable caching for auth/dynamic routes
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    
    access_log  /www/wwwlogs/slopanelbankerV1.log;
    error_log  /www/wwwlogs/slopanelbankerV1.error.log;
}
