server {
    listen 80;
    server_name slofinace.website www.slofinace.website;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name slofinace.website www.slofinace.website;
    index index.html;
    root /www/wwwroot/banker/slopanel-bankerV1;

    # SSL (Paths generated by aaPanel)
    ssl_certificate    /www/server/panel/vhost/cert/slofinace.website/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/slofinace.website/privkey.pem;
    
    # Next.js Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:6936;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    access_log  /www/wwwlogs/slofinace.website.log;
    error_log  /www/wwwlogs/slofinace.website.error.log;
}
